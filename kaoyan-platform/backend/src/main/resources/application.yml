server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: kaoyan-platform
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/kaoyan_platform?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:jxy2012520}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:kaoyan-platform-secret-key-2026}
  expiration: 86400000

logging:
  level:
    com.kaoyan.platform: debug
